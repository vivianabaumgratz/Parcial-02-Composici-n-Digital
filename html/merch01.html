<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Merch Store</title>

<link rel="stylesheet" href="https://use.typekit.net/eft0ddk.css">
<link rel="stylesheet" href="../css/merch.css">
</head>
<body>
  <nav class="navegador">
  <div class="logo">idEVENTS</div>
<ul>
  <li><a href="../html/Itinerario.html">Itinerario</a></li>
   <li><a href="../html/FAQ.html">FAQ</a></li>
  <li><a href="#contacto">Contacto</a></li>
  <li><a href="#llegar">¿Cómo llegar?</a></li>
</ul>
</nav>
<header class="nav">
  <h1>
    <a href="../index.html">MERCH STORE</a>
  </h1>
  <div class="cart-icon" onclick="openCart()">
    🛒 <span id="cartCount">0</span>
  </div>
</header>
<section class="products-container">

  <div class="product-card">
    <div class="img-box">
      <img src="../Fotos/buzo.webp" alt="Buzo">
    </div>

    <div class="info">
      <h2>Buzo | Aquí estoy, envíame a mí</h2>
      <p>Isaías 6:8</p>
      <p class="price">$59.99</p>

      <button class="btn"
      onclick="addToCart('Buzo Aquí estoy, envíame a mí',59.99)">
      Agregar al carrito
      </button>

      <button class="btn-whatsapp"
      onclick="window.open('https://wa.me/5491123456789?text=Hola,%20quiero%20comprar%20el%20buzo','_blank')">
      Comprar por WhatsApp
      </button>
    </div>
  </div>

  <div class="product-card">
    <div class="img-box">
      <img src="../Fotos/gorro.webp" alt="Remera">
    </div>

    <div class="info">
      <h2>Gorro | “Todo lo puedo en Cristo”</h2>
      <p>Filipenses 4:13</p>
      <p class="price">$39.99</p>

      <button class="btn"
      onclick="addToCart('Remera Generación de Fuego',39.99)">
      Agregar al carrito
      </button>

      <button class="btn-whatsapp"
      onclick="window.open('https://wa.me/5491123456789?text=Hola,%20quiero%20comprar%20la%20remera','_blank')">
      Comprar por WhatsApp
      </button>
    </div>
  </div>
  <div class="product-card">
    <div class="img-box">
      <img src="../Fotos/tote.webp" alt="Gorra">
    </div>

    <div class="info">
      <h2>Tote | “Jesús es mi canción”</h2>
      <p>Juan 3:16</p>
      <p class="price">$199.99</p>

      <button class="btn"
      onclick="addToCart('Gorra Dios es Fiel',24.99)">
      Agregar al carrito
      </button>

      <button class="btn-whatsapp"
      onclick="window.open('https://wa.me/5491123456789?text=Hola,%20quiero%20comprar%20la%20gorra','_blank')">
      Comprar por WhatsApp
      </button>
    </div>
  </div>
</section>
<div class="cart" id="cart">
  <h3>Tu carrito</h3>

  <div id="cartItems"></div>

  <div class="cart-total">
    Total: $<span id="total">0.00</span>
  </div>
 <a href="../html/checkout.html" class="checkout-btn">
  Finalizar compra
</a>
</div>
<script src="../js/script4.js"></script>
</body>
</html>
